version: '3.8'

services:
  # Наше веб-приложение
  app:
    build: .
    container_name: lab_docker_app
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=tasks_db
    depends_on:
      db:
        condition: service_healthy

  # База данных MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: tasks_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Монтируем наш init.sql внутрь папки авто-инициализации MySQL
      - ./db:/docker-entrypoint-initdb.dir
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
