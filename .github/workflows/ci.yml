name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtest-dev libgmock-dev lcov
    
    - name: Configure CMake
      run: cmake -H. -B_build -DBUILD_TESTS=ON -DENABLE_COVERAGE=ON
    
    - name: Build
      run: cmake --build _build
    
    - name: Run tests
      run: ./_build/check
    
    - name: Generate coverage report
      run: |
        cd _build
        lcov --directory . --capture --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/third-party/*' --output-file coverage.info
        lcov --list coverage.info
    
    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: _build/coverage.info
        github-token: ${{ secrets.GITHUB_TOKEN }}
